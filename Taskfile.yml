# https://taskfile.dev

version: "3"

tasks:
  setup:
    cmds:
      - bun i
      - cd app && bun i

  dev:
    deps: [setup]
    dir: ./app
    aliases: [d]
    dotenv:
      - ../.env
    env:
      DEV: true
      HOST: 0.0.0.0
      VEKTOR_NO_AUTH: "1"
    cmds:
      - bun --watch ./src/server.ts

  preview:
    deps: [setup]
    dir: ./app
    dotenv:
      - ../.env.preview
    env:
      HOST: 0.0.0.0
    cmds:
      - task: compile
      - ./vektor serve
      
  build:
    deps: [setup]
    dir: ./app
    dotenv:
      - ../.env
    cmds:
      - bunx --bun astro build

  compile:
    dir: ./app
    desc: Compile full app with server into a single executable using bun.
    dotenv:
      - ../.env
    cmds:
      - bunx --bun astro build
      - bun run ./build.ts
      - bun build ./vektor.ts --compile --external lightningcss --outfile ./vektor

  start:
    dir: ./app
    desc: Start the compiled binary with the current runtime environment.
    cmds:
      - ./vektor serve --no-auth

  test:
    dir: ./app
    dotenv:
      - ../.env
    cmds:
      - ./vektor serve --email-auth --port 4321 --host 127.0.0.1 &
        echo $! > /tmp/vektor-test-server.pid
      - defer: kill $(cat /tmp/vektor-test-server.pid) 2>/dev/null || true
      - until curl -sf http://127.0.0.1:4321/ > /dev/null 2>&1; do sleep 0.1; done
      - bun test {{.CLI_ARGS}}

  wif:convert:
    desc: Convert XWiki export to WIF and create ZIP archive
    cmds:
      - bun scripts/convert-xwiki-to-wif.ts
      - cd output/technik-wiki && zip -r ../technik-wiki.wif.zip .

  perf:test-data:
    desc: Generate 20000 documents with revisions for performance testing
    cmd: bun scripts/create-perf-test-data.ts
