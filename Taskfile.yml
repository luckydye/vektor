# https://taskfile.dev

version: "3"

tasks:
  setup:
    cmds:
      - bun i
      - cd app && bun i

  workflow:run:
    cmds:
      - bun ./cli/src/workflow.ts {{.CLI_ARGS}}

  dev:
    deps: [setup]
    dir: ./app
    aliases: [d]
    dotenv:
      - .env
    env:
      DEV: true
      HOST: 0.0.0.0
    cmds:
      - bun --watch ./src/server.ts

  preview:
    deps: [setup]
    dir: ./app
    dotenv:
      - ../.env.preview
    env:
      HOST: 0.0.0.0
    cmds:
      - task: compile
      - ./vektor-server
      
  prod:
    deps: [setup]
    dir: ./app
    dotenv:
      - ../.env.prod
    env:
      HOST: 0.0.0.0
    cmds:
      - bunx --bun astro build
      - bun run ./scripts/generate-client-assets.ts
      - ./vektor-server
  build:
    deps: [setup]
    dir: ./app
    dotenv:
      - .env
    cmds:
      - bunx --bun astro build

  compile:
    dir: ./app
    desc: Compile full app with server into a single executable using bun.
    dotenv:
      - .env
    cmds:
      - bunx --bun astro build
      - bun run ./scripts/generate-client-assets.ts
      - bun build ./src/server.ts --compile --external lightningcss --outfile ./vektor-server

  start:
    dir: ./app
    desc: Start the compiled binary with the current runtime environment.
    env:
      HOST: 0.0.0.0
    cmds:
      - ./vektor-server

  test:
    dir: ./app
    dotenv:
      - .env
    cmds:
      - bun test {{.CLI_ARGS}}

  drizzle:
    dir: ./app
    dotenv:
      - .env
    cmd: bunx drizzle-kit {{.CLI_ARGS}}

  wif:convert:
    desc: Convert XWiki export to WIF and create ZIP archive
    cmds:
      - bun scripts/convert-xwiki-to-wif.ts
      - cd output/technik-wiki && zip -r ../technik-wiki.wif.zip .

  perf:test-data:
    desc: Generate 20000 documents with revisions for performance testing
    cmd: bun scripts/create-perf-test-data.ts
