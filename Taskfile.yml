# https://taskfile.dev

version: "3"

dotenv:
  - .env

tasks:
  setup:
    cmds:
      - bun i
      - cd app && bun i

  cli:
    env:
      WIKI_HOST: https://wiki.luckydye.de/
      WIKI_ACCESS_TOKEN: "at_74b848a7243e397c73c50ca3779105ce2d41f203212b5eacc43b4b401e97556c"
      WIKI_SPACEID: "46e85327-5520-4122-99c6-d5f6360233a5"
    cmds:
      - ./extension-api/cli-client.ts {{.CLI_ARGS}}

  dev:
    deps: [setup]
    aliases: [d]
    cmd: task --parallel app server
  app:
    dir: ./app
    cmds:
      - bunx --bun astro dev --host
  server:
    dir: ./app
    cmds:
      - bun ./src/server.ts

  preview:
    deps: [setup]
    dir: ./app
    dotenv:
      - ../.env.preview
    cmds:
      - bunx --bun astro build
      - bun ./src/server.ts
  prod:
    deps: [setup]
    dir: ./app
    dotenv:
      - ../.env.prod
    cmds:
      - bunx --bun astro build
      - bun ./src/server.ts
  build:
    deps: [setup]
    dir: ./app
    cmds:
      - bunx --bun astro build

  compile:
    dir: ./app
    desc: Compile full app with server into a single executable using bun.
    cmds:
      - bun build ./src/server.ts --compile --outfile ./wiki

  test:
    dir: ./app
    cmds:
      - bun test {{.CLI_ARGS}}

  drizzle:
    dir: ./app
    cmd: bunx drizzle-kit {{.CLI_ARGS}}

  wif:convert:
    desc: Convert XWiki export to WIF and create ZIP archive
    cmds:
      - bun scripts/convert-xwiki-to-wif.ts
      - cd output/technik-wiki && zip -r ../technik-wiki.wif.zip .

  perf:test-data:
    desc: Generate 20000 documents with revisions for performance testing
    cmd: bun scripts/create-perf-test-data.ts
