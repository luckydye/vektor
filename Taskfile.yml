# https://taskfile.dev

version: "3"

tasks:
  setup:
    cmds:
      - bun i
      - cd app && bun i
      - task: native:image
      - task: native:exec

  native:image:
    desc: Build the native image addon (Rust → .node) for the host platform.
    dir: ./app/native/image
    sources:
      - Cargo.toml
      - Cargo.lock
      - build.rs
      - src/**/*.rs
    generates:
      - ../../src/files/native/image-*.node
    cmds:
      - bun i
      - bun run build

  native:exec:
    desc: Build the native JavaScript runtime (Rust → .node) for the host platform.
    dir: ./app/native/exec
    sources:
      - Cargo.toml
      - Cargo.lock
      - build.rs
      - src/**/*.rs
    generates:
      - ../../src/exec/native/exec-*.node
    cmds:
      - bun i
      - bun run build

  dev:
    deps: [setup]
    dir: ./app
    aliases: [d]
    dotenv:
      - ../.env
    env:
      DEV: true
      HOST: 0.0.0.0
      VEKTOR_SITE_URL: http://127.0.0.1:4321
      VEKTOR_API_URL: http://127.0.0.1:4321
      VEKTOR_COLLABORATION_HOST: 127.0.0.1:8080
      VEKTOR_NO_AUTH: "1"
    cmds:
      - bun --watch ./src/server.ts

  preview:
    deps: [setup]
    dir: ./app
    dotenv:
      - ../.env.preview
    env:
      HOST: 0.0.0.0
    cmds:
      - task: compile
      - ./vektor serve
      
  build:
    deps: [setup]
    dir: ./app
    dotenv:
      - ../.env
    cmds:
      - bunx --bun astro build

  compile:
    dir: ./app
    desc: Compile full app with server into a single executable using bun.
    deps: [native:image, native:exec]
    dotenv:
      - ../.env
    cmds:
      - bunx --bun astro build
      - bun run ./build.ts

  start:
    dir: ./app
    desc: Start the compiled binary with the current runtime environment.
    dotenv:
      - ../.env
    env:
      VEKTOR_SITE_URL: http://127.0.0.1:8080
      VEKTOR_API_URL: http://127.0.0.1:8080
      VEKTOR_COLLABORATION_HOST: 127.0.0.1:8080
    cmds:
      - ./vektor serve --no-auth

  check:
    desc: Typecheck the project.
    deps: [check:tsc, check:biome]

  check:tsc:
    internal: true
    dir: ./app
    cmds:
      - |
        TSC_OUT=$(../node_modules/.bin/tsgo --noEmit --pretty false 2>&1 | awk '
          /^[^[:space:]].*\([0-9]+,[0-9]+\): / { skip = ($0 ~ /node_modules/) ? 1 : 0 }
          !skip { print }
        ')
        echo "== tsc =="
        printf '%s\n' "$TSC_OUT"
        [ -z "$TSC_OUT" ]

  check:biome:
    internal: true
    dir: ./app
    cmds:
      - echo "== biome =="
      - bunx biome check --diagnostic-level=error

  test:
    dir: ./app
    dotenv:
      - ../.env
    env:
      NODE_ENV: test 
    cmds:
      - ./vektor serve --email-auth --port 4321 --host 127.0.0.1 &
        echo $! > /tmp/vektor-test-server.pid
      - defer: kill $(cat /tmp/vektor-test-server.pid) 2>/dev/null || true
      - until curl -sf http://127.0.0.1:4321/ > /dev/null 2>&1; do sleep 0.1; done
      - bun test {{.CLI_ARGS}}

  docker:build:
    desc: Build a Docker image for the host architecture with the vektor binary baked in.
    cmds:
      - docker build -t luckydye/vektor .
