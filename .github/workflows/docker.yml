name: Build and push Docker image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  docker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            architecture: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            architecture: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      CARGO_BUILD_JOBS: 1
      RUST_MIN_STACK: 16777216
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          bun i
          cd app
          bun i

      - name: Build native image addon
        working-directory: app/native/image
        run: |
          bun i
          bun run build

      - name: Build native JavaScript runtime
        working-directory: app/native/exec
        run: |
          bun i
          bun run build

      - name: Build native embedding runtime
        working-directory: app/native/embedding
        run: |
          bun i
          bun run build

      - name: Compile binary
        working-directory: app
        run: |
          bunx --bun astro build
          bun run ./build.ts

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ matrix.architecture }}
          push: true

  manifest:
    needs: docker
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-architecture manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository }}:latest \
            --tag ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64 \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64
