name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: vektor-linux-x64
          - runner: macos-latest
            artifact: vektor-darwin-arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Builds the native image addon (Rust N-API → .node). Each runner builds
      # for its own platform, so the addon arch matches the compiled binary —
      # no cross-compilation.
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          bun i
          cd app && bun i

      - name: Build native image addon
        working-directory: app/native/image
        run: |
          bun i
          bun run build

      - name: Build Astro assets + compile binary
        working-directory: app
        run: |
          bunx --bun astro build
          bun run ./build.ts
          mv ./vektor ./${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: app/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vektor-linux-x64
            artifacts/vektor-darwin-arm64
