name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep the Linux native ABI baseline older than supported production
          # hosts. ubuntu-latest can raise its glibc requirement without notice.
          - runner: ubuntu-22.04
            artifact: vektor-linux-x64
          - runner: macos-latest
            artifact: vektor-darwin-arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Build native N-API addons on each target platform so their architecture
      # matches the compiled Bun binary.
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          bun i
          cd app && bun i

      - name: Build native image addon
        working-directory: app/native/image
        run: |
          bun i
          bun run build

      - name: Build native JavaScript runtime
        working-directory: app/native/exec
        run: |
          bun i
          bun run build

      - name: Build native embedding runtime
        working-directory: app/native/embedding
        run: |
          bun i
          bun run build

      - name: Build Astro assets + compile binary
        working-directory: app
        run: |
          bunx --bun astro build
          bun run ./build.ts
          mv ./vektor ./${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: app/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vektor-linux-x64
            artifacts/vektor-darwin-arm64

  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vektor-linux-x64
          path: artifacts

      - name: Upload release binary
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: artifacts/vektor-linux-x64
          target: /tmp
          strip_components: 1
          overwrite: true

      - name: Install and restart Vektor
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu
            sudo install -m 755 /tmp/vektor-linux-x64 /usr/local/bin/vektor.new
            sudo mv -f /usr/local/bin/vektor.new /usr/local/bin/vektor
            tmux send-keys -t 0:0.0 C-c
            sleep 1
            tmux send-keys -t 0:0.0 '/usr/local/bin/vektor serve --port 3000' Enter
