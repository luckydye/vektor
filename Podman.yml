# https://taskfile.dev
version: 3

tasks:
  auth:
    desc: Authenticate to remote
    requires:
      vars: [SSH_DEPLOY_KEY, SSH_KNOWN_HOST]
    cmds:
      - mkdir -p ~/.ssh
      - cat {{.SSH_KNOWN_HOST}} >> ~/.ssh/known_hosts
      - chmod -R 400 ~/.ssh
      - eval $(ssh-agent -s) && cat {{.SSH_DEPLOY_KEY}} | tr -d '\r' | ssh-add -

  # This is a generic deploy task to deploy containers using podman,
  deploy:
    desc: Deploy container image to host
    dir: "{{.USER_WORKING_DIR}}"
    deps: [auth]
    requires:
      vars: [DEST_HOST_USER, DEST_HOST, DEST_HOST_DIR]
    cmds:
      - scp ./compose.yaml {{.DEST_HOST_USER}}@{{.DEST_HOST}}:{{.DEST_HOST_DIR}}/compose.yaml
      - ssh {{.DEST_HOST_USER}}@{{.DEST_HOST}} podman compose pull
      - ssh {{.DEST_HOST_USER}}@{{.DEST_HOST}} podman compose down
      - ssh {{.DEST_HOST_USER}}@{{.DEST_HOST}} podman compose up
      - echo 'Successfully deployed at "https://{{.DEST_HOST}}/"'