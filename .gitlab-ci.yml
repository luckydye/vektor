include:
  - component: $CI_SERVER_FQDN/sv/taskfiles/mise@3.0.0

stages:
  - build
  - deploy

build:
  image: docker:latest
  stage: build
  services:
    - docker:dind
  before_script:
    - echo noop
  script:
    # Compile against the same Debian baseline as the deployed runtime. Native
    # addons built on the GitLab runner may otherwise require a newer glibc.
    - docker build . --tag vektor-runtime --platform linux/amd64
    - container_id="$(docker create vektor-runtime)"
    - docker cp "$container_id:/app/vektor" ./app/vektor
    - docker rm "$container_id"
  artifacts:
    paths:
      - app/vektor
    expire_in: 1 week

# Only needed when system dependencies (pandoc, jq, etc.) change.
build-runtime:
  image: docker:latest
  stage: build
  when: manual
  services:
    - docker:dind
  before_script:
    - echo noop
  script:
    - docker login --username gitlab-ci-token --password $CI_JOB_TOKEN registry.s-v.de
    - docker build . --tag registry.s-v.de/tihav/wiki --platform linux/amd64
    - docker push registry.s-v.de/tihav/wiki

deploy:
  stage: deploy
  when: manual
  needs: [build]
  script:
    - mkdir -p ~/.ssh
    - cat $SSH_KNOWN_HOST >> ~/.ssh/known_hosts
    - chmod -R 400 ~/.ssh
    - chmod 400 $SSH_DEPLOY_KEY
    - scp -v -i $SSH_DEPLOY_KEY ./compose.yaml $DEST_HOST_USER@$DEST_HOST:$DEST_HOST_DIR/compose.yaml
    - scp -v -i $SSH_DEPLOY_KEY $DEST_ENV $DEST_HOST_USER@$DEST_HOST:$DEST_HOST_DIR/env
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST docker compose -f $DEST_HOST_DIR/compose.yaml down
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST "docker login $CI_REGISTRY -u gitlab-ci-token -p $CI_JOB_TOKEN"
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST docker compose -f $DEST_HOST_DIR/compose.yaml pull
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST "mkdir -p $DEST_HOST_DIR/bin"
    - scp -O -i $SSH_DEPLOY_KEY ./app/vektor $DEST_HOST_USER@$DEST_HOST:$DEST_HOST_DIR/bin/vektor
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST docker compose -f $DEST_HOST_DIR/compose.yaml up -d

shutdown:
  stage: deploy
  when: manual
  script:
    - mkdir -p ~/.ssh
    - cat $SSH_KNOWN_HOST >> ~/.ssh/known_hosts
    - chmod -R 400 ~/.ssh
    - chmod 400 $SSH_DEPLOY_KEY
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST docker compose -f $DEST_HOST_DIR/compose.yaml down
