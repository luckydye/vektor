include:
  - component: $CI_SERVER_FQDN/sv/taskfiles/mise@3.0.0

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - task setup
    - task compile
  artifacts:
    paths:
      - app/vektor
    expire_in: 1 week

# Only needed when system dependencies (pandoc, jq, etc.) change.
build-runtime:
  image: docker:latest
  stage: build
  when: manual
  services:
    - docker:dind
  before_script:
    - echo noop
  script:
    - docker login --username gitlab-ci-token --password $CI_JOB_TOKEN registry.s-v.de
    - docker build . --tag registry.s-v.de/tihav/wiki --platform linux/amd64
    - docker push registry.s-v.de/tihav/wiki

deploy:
  stage: deploy
  needs: [build]
  script: task -t ./Deploy.yml deploy

shutdown:
  stage: deploy
  when: manual
  script: task -t ./Deploy.yml shutdown
