include:
  - component: $CI_SERVER_FQDN/sv/taskfiles/mise@2.2.0

stages:
  - build
  - deploy

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login --username gitlab-ci-token --password $CI_JOB_TOKEN registry.s-v.de
    - docker build . --tag registry.s-v.de/tihav/wiki --platform linux/amd64
    - docker push registry.s-v.de/tihav/wiki

deploy:
  stage: deploy
  when: manual
  allow_failure: false
  script: task -t ./Deploy.yml deploy
