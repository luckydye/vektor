include:
  - component: $CI_SERVER_FQDN/sv/taskfiles/mise@3.0.0

stages:
  - build
  - package
  - deploy

build:
  stage: build
  script:
    - apt-get update -qq && apt-get install -y -qq build-essential
    - bun i
    - cd app && bun i
    - task compile
  artifacts:
    paths:
      - app/vektor
    expire_in: 1 week

image:
  image: docker:latest
  stage: package
  needs: [build]
  services:
    - docker:dind
  before_script:
    - echo noop
  script:
    - docker login --username gitlab-ci-token --password $CI_JOB_TOKEN $CI_REGISTRY
    - docker build . --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA --tag $CI_REGISTRY_IMAGE:latest --platform linux/amd64
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest

deploy:
  stage: deploy
  when: manual
  needs: [image]
  script:
    - mkdir -p ~/.ssh
    - cat $SSH_KNOWN_HOST >> ~/.ssh/known_hosts
    - chmod -R 400 ~/.ssh
    - chmod 400 $SSH_DEPLOY_KEY
    - scp -v -i $SSH_DEPLOY_KEY ./compose.yaml $DEST_HOST_USER@$DEST_HOST:$DEST_HOST_DIR/compose.yaml
    - scp -v -i $SSH_DEPLOY_KEY $DEST_ENV $DEST_HOST_USER@$DEST_HOST:$DEST_HOST_DIR/env
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST docker compose -f $DEST_HOST_DIR/compose.yaml down
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST "docker login $CI_REGISTRY -u gitlab-ci-token -p $CI_JOB_TOKEN"
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST "VEKTOR_IMAGE=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA docker compose -f $DEST_HOST_DIR/compose.yaml pull"
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST "VEKTOR_IMAGE=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA docker compose -f $DEST_HOST_DIR/compose.yaml up -d"

shutdown:
  stage: deploy
  when: manual
  script:
    - mkdir -p ~/.ssh
    - cat $SSH_KNOWN_HOST >> ~/.ssh/known_hosts
    - chmod -R 400 ~/.ssh
    - chmod 400 $SSH_DEPLOY_KEY
    - ssh -i $SSH_DEPLOY_KEY $DEST_HOST_USER@$DEST_HOST docker compose -f $DEST_HOST_DIR/compose.yaml down
