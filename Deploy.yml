# https://taskfile.dev
version: 3

tasks:
  auth:
    desc: Authenticate to remote
    requires:
      vars: [SSH_DEPLOY_KEY, SSH_KNOWN_HOST]
    cmds:
      - mkdir -p ~/.ssh
      - cat {{.SSH_KNOWN_HOST}} >> ~/.ssh/known_hosts
      - chmod -R 400 ~/.ssh
      - chmod 400 {{.SSH_DEPLOY_KEY}}

  deploy:
    desc: Deploy container image to host
    dir: "{{.USER_WORKING_DIR}}"
    deps: [auth]
    requires:
      vars: [DEST_HOST_USER, DEST_HOST, DEST_HOST_DIR]
    cmds:
      - apt-get update && apt-get install -y rsync
      
      # - scp -i {{.SSH_DEPLOY_KEY}} ./compose.yaml {{.DEST_HOST_USER}}@{{.DEST_HOST}}:{{.DEST_HOST_DIR}}/compose.yaml
      # - scp -i {{.SSH_DEPLOY_KEY}} {{.DEST_ENV}} {{.DEST_HOST_USER}}@{{.DEST_HOST}}:{{.DEST_HOST_DIR}}/
      
      - rsync -e "ssh -i {{.SSH_DEPLOY_KEY}} {{.DEST_HOST_USER}}@{{.DEST_HOST}}" -avz --delete ./compose.yaml {{.DEST_HOST_USER}}@{{.DEST_HOST}}:{{.DEST_HOST_DIR}}/compose.yaml
      - rsync -e "ssh -i {{.SSH_DEPLOY_KEY}} {{.DEST_HOST_USER}}@{{.DEST_HOST}}" -avz --delete {{.DEST_ENV}} {{.DEST_HOST_USER}}@{{.DEST_HOST}}:{{.DEST_HOST_DIR}}/env
      
      - ssh -i {{.SSH_DEPLOY_KEY}} {{.DEST_HOST_USER}}@{{.DEST_HOST}} docker login --username gitlab-ci-token --password $CI_JOB_TOKEN registry.s-v.de
      - ssh -i {{.SSH_DEPLOY_KEY}} {{.DEST_HOST_USER}}@{{.DEST_HOST}} docker compose -f {{.DEST_HOST_DIR}}/compose.yaml pull
      - ssh -i {{.SSH_DEPLOY_KEY}} {{.DEST_HOST_USER}}@{{.DEST_HOST}} docker compose -f {{.DEST_HOST_DIR}}/compose.yaml down
      - ssh -i {{.SSH_DEPLOY_KEY}} {{.DEST_HOST_USER}}@{{.DEST_HOST}} docker compose -f {{.DEST_HOST_DIR}}/compose.yaml up -d

  shutdown:
    desc: Deploy container image to host
    dir: "{{.USER_WORKING_DIR}}"
    deps: [auth]
    requires:
      vars: [DEST_HOST_USER, DEST_HOST, DEST_HOST_DIR]
    cmds:
      - ssh -i {{.SSH_DEPLOY_KEY}} {{.DEST_HOST_USER}}@{{.DEST_HOST}} docker compose -f {{.DEST_HOST_DIR}}/compose.yaml down
